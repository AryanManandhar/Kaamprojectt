<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kam Admin — Users</title>
<style>
  :root {
    --bg: #0f1215;
    --panel: #171b1f;
    --panel-2: #1e2328;
    --border: #2a3038;
    --text: #e7eaee;
    --text-dim: #8a92a0;
    --accent: #4f8cff;
    --danger: #e5484d;
    --danger-dim: #3a1f21;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }

  /* ---------- Login gate ---------- */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #login-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 36px 32px;
    width: 320px;
    text-align: center;
  }
  #login-box .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  #login-box h1 {
    font-size: 20px;
    margin: 0 0 22px;
    font-weight: 600;
  }
  #login-box input {
    width: 100%;
    padding: 11px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  #login-box input:focus { border-color: var(--accent); }
  #login-box button {
    width: 100%;
    margin-top: 12px;
    padding: 11px 12px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  #login-box button:hover { opacity: 0.92; }
  #login-error {
    color: var(--danger);
    font-size: 12.5px;
    margin-top: 12px;
    min-height: 16px;
  }

  /* ---------- Dashboard ---------- */
  #dashboard { display: none; max-width: 980px; margin: 0 auto; padding: 40px 24px 80px; }
  header.top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  header.top .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  header.top h1 { font-size: 24px; margin: 4px 0 0; font-weight: 600; }
  #logout-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  #logout-btn:hover { color: var(--text); border-color: var(--text-dim); }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .stat-card .num {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 700;
  }
  .stat-card .label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .table-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .table-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .table-head input {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 10px;
    font-size: 13px;
    width: 220px;
    outline: none;
  }
  .table-head input:focus { border-color: var(--accent); }
  #refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  #refresh-btn:hover { color: var(--text); }

  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  thead th {
    text-align: left;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 600;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--panel-2); }
  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .badge.google { color: #7fb1ff; border-color: #2c4a75; }
  .badge.facebook { color: #8fa9ff; border-color: #2c3a75; }
  .badge.password { color: #7fd88f; border-color: #2c5b3a; }
  td.email { color: var(--text-dim); }
  td.date { color: var(--text-dim); font-family: var(--mono); font-size: 12px; white-space: nowrap; }
  .del-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--danger);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .del-btn:hover { background: var(--danger-dim); border-color: var(--danger); }

  #empty-state, #loading-state {
    padding: 48px 18px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13.5px;
  }
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div id="login-box">
      <div class="eyebrow">Kam</div>
      <h1>Admin sign-in</h1>
      <input type="password" id="password-input" placeholder="Admin password" autofocus />
      <button id="login-btn">Enter</button>
      <div id="login-error"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <header class="top">
      <div>
        <div class="eyebrow">Kam Admin</div>
        <h1>Users</h1>
      </div>
      <button id="logout-btn">Log out</button>
    </header>

    <div class="stats">
      <div class="stat-card"><div class="num" id="stat-total">—</div><div class="label">Total users</div></div>
      <div class="stat-card"><div class="num" id="stat-password">—</div><div class="label">Password accounts</div></div>
      <div class="stat-card"><div class="num" id="stat-oauth">—</div><div class="label">Google / Facebook accounts</div></div>
    </div>

    <div class="table-wrap">
      <div class="table-head">
        <input type="text" id="search-input" placeholder="Search by name or email…" />
        <button id="refresh-btn">Refresh</button>
      </div>
      <div id="loading-state">Loading users…</div>
      <div id="empty-state" style="display:none;">No users found.</div>
      <table id="users-table" style="display:none;">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Sign-in method</th>
            <th>Joined</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="toast"></div>

<script>
  const state = { password: sessionStorage.getItem('kam_admin_pw') || '', users: [] };

  const loginScreen = document.getElementById('login-screen');
  const dashboard = document.getElementById('dashboard');
  const passwordInput = document.getElementById('password-input');
  const loginBtn = document.getElementById('login-btn');
  const loginError = document.getElementById('login-error');
  const searchInput = document.getElementById('search-input');
  const refreshBtn = document.getElementById('refresh-btn');
  const logoutBtn = document.getElementById('logout-btn');

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  async function apiRequest(path, options = {}) {
    const res = await fetch(path, {
      ...options,
      headers: {
        'Content-Type': 'application/json',
        'x-admin-password': state.password,
        ...(options.headers || {}),
      },
    });
    if (res.status === 401) {
      sessionStorage.removeItem('kam_admin_pw');
      state.password = '';
      showLogin('Session expired. Please sign in again.');
      throw new Error('Unauthorized');
    }
    return res.json();
  }

  function showLogin(errorMsg) {
    loginScreen.style.display = 'flex';
    dashboard.style.display = 'none';
    loginError.textContent = errorMsg || '';
    passwordInput.value = '';
    passwordInput.focus();
  }

  function showDashboard() {
    loginScreen.style.display = 'none';
    dashboard.style.display = 'block';
    loadStats();
    loadUsers();
  }

  async function attemptLogin() {
    const pw = passwordInput.value;
    if (!pw) return;
    loginError.textContent = '';
    loginBtn.disabled = true;
    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      const data = await res.json();
      if (data.success) {
        state.password = pw;
        sessionStorage.setItem('kam_admin_pw', pw);
        showDashboard();
      } else {
        loginError.textContent = data.message || 'Wrong password.';
      }
    } catch (err) {
      loginError.textContent = 'Could not reach the admin server.';
    } finally {
      loginBtn.disabled = false;
    }
  }

  loginBtn.addEventListener('click', attemptLogin);
  passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); });

  logoutBtn.addEventListener('click', () => {
    sessionStorage.removeItem('kam_admin_pw');
    state.password = '';
    showLogin();
  });

  async function loadStats() {
    try {
      const data = await apiRequest('/api/admin/stats');
      if (data.success) {
        document.getElementById('stat-total').textContent = data.stats.total;
        document.getElementById('stat-password').textContent = data.stats.withPassword;
        document.getElementById('stat-oauth').textContent = data.stats.oauthUsers;
      }
    } catch (e) { /* handled in apiRequest */ }
  }

  function methodBadge(user) {
    if (user.oauth_provider) {
      const cls = user.oauth_provider.toLowerCase();
      return `<span class="badge ${cls}">${user.oauth_provider}</span>`;
    }
    return `<span class="badge password">Password</span>`;
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function renderUsers(list) {
    const tbody = document.getElementById('users-tbody');
    const table = document.getElementById('users-table');
    const empty = document.getElementById('empty-state');

    if (!list.length) {
      table.style.display = 'none';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    table.style.display = 'table';

    tbody.innerHTML = list.map(u => `
      <tr data-id="${u.id}">
        <td>${escapeHtml(u.name || '—')}</td>
        <td class="email">${escapeHtml(u.email || '—')}</td>
        <td>${methodBadge(u)}</td>
        <td class="date">${formatDate(u.created_at)}</td>
        <td style="text-align:right;"><button class="del-btn" data-id="${u.id}">Delete</button></td>
      </tr>
    `).join('');

    tbody.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteUser(btn.dataset.id));
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function loadUsers() {
    document.getElementById('loading-state').style.display = 'block';
    document.getElementById('users-table').style.display = 'none';
    document.getElementById('empty-state').style.display = 'none';
    try {
      const data = await apiRequest('/api/admin/users');
      if (data.success) {
        state.users = data.users;
        applyFilter();
      } else {
        showToast(data.message || 'Failed to load users.');
      }
    } catch (e) {
      // handled by apiRequest for 401s; show generic message otherwise
    } finally {
      document.getElementById('loading-state').style.display = 'none';
    }
  }

  function applyFilter() {
    const q = searchInput.value.trim().toLowerCase();
    const filtered = !q
      ? state.users
      : state.users.filter(u =>
          (u.name || '').toLowerCase().includes(q) ||
          (u.email || '').toLowerCase().includes(q)
        );
    renderUsers(filtered);
  }

  searchInput.addEventListener('input', applyFilter);
  refreshBtn.addEventListener('click', () => { loadStats(); loadUsers(); });

  async function deleteUser(id) {
    const user = state.users.find(u => String(u.id) === String(id));
    const label = user ? (user.email || user.name || `#${id}`) : `#${id}`;
    if (!confirm(`Delete user ${label}? This cannot be undone.`)) return;
    try {
      const data = await apiRequest(`/api/admin/users/${id}`, { method: 'DELETE' });
      if (data.success) {
        state.users = state.users.filter(u => String(u.id) !== String(id));
        applyFilter();
        loadStats();
        showToast('User deleted.');
      } else {
        showToast(data.message || 'Failed to delete user.');
      }
    } catch (e) { /* handled in apiRequest */ }
  }

  // Auto-login if we still have a password from this session.
  if (state.password) {
    showDashboard();
  } else {
    showLogin();
  }
</script>
</body>
</html>
